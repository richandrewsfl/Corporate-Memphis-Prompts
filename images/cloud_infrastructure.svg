<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#0f3d53"/>
  
  <!-- Background stars/dots -->
  <circle cx="40" cy="60" r="2" fill="#00d2d3" />
  <circle cx="360" cy="120" r="3" fill="#ff9ff3" />
  <circle cx="80" cy="240" r="2" fill="#ff9ff3" />
  <circle cx="300" cy="260" r="3" fill="#00d2d3" />
  
  <!-- Glowing Nodes/Connections -->
  <path d="M 200,130 L 200,190 M 200,160 L 100,160 L 100,200 M 200,160 L 300,160 L 300,200" stroke="#00d2d3" stroke-width="3" fill="none" stroke-dasharray="5,5" />
  
  <!-- Servers (Left, Middle, Right) -->
  <!-- Left Server -->
  <g transform="translate(50, 200)">
    <rect x="0" y="0" width="90" height="50" rx="6" fill="#34495e" stroke="#00d2d3" stroke-width="2" />
    <circle cx="20" cy="25" r="5" fill="#2ecc71" />
    <line x1="40" y1="20" x2="80" y2="20" stroke="#bdc3c7" stroke-width="3" />
    <line x1="40" y1="30" x2="70" y2="30" stroke="#bdc3c7" stroke-width="3" />
  </g>
  
  <!-- Center Server -->
  <g transform="translate(155, 195)">
    <rect x="0" y="0" width="90" height="60" rx="6" fill="#2c3e50" stroke="#00d2d3" stroke-width="3" />
    <circle cx="20" cy="30" r="6" fill="#2ecc71" />
    <line x1="40" y1="25" x2="80" y2="25" stroke="#ffffff" stroke-width="4" />
    <line x1="40" y1="38" x2="70" y2="38" stroke="#ffffff" stroke-width="4" />
  </g>
  
  <!-- Right Server -->
  <g transform="translate(260, 200)">
    <rect x="0" y="0" width="90" height="50" rx="6" fill="#34495e" stroke="#00d2d3" stroke-width="2" />
    <circle cx="20" cy="25" r="5" fill="#e74c3c" />
    <line x1="40" y1="20" x2="80" y2="20" stroke="#bdc3c7" stroke-width="3" />
    <line x1="40" y1="30" x2="70" y2="30" stroke="#bdc3c7" stroke-width="3" />
  </g>
  
  <!-- Cloud (Giant, Top Centered) -->
  <g transform="translate(120, 50)">
    <path d="M 30,60 
             A 30,30 0 0,1 60,30 
             A 40,40 0 0,1 120,25 
             A 35,35 0 0,1 150,60 
             A 25,25 0 0,1 140,90 
             L 30,90 
             A 25,25 0 0,1 30,60 Z" fill="#ffffff" />
    <!-- Cloud shadow/offset inside -->
    <path d="M 60,30 A 40,40 0 0,1 120,25 A 35,35 0 0,1 140,60" fill="none" stroke="#ff9ff3" stroke-width="5" opacity="0.6"/>
  </g>
</svg>
