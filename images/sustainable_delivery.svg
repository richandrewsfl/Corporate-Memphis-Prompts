<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#1a1c24"/>
  <!-- Decorative background elements -->
  <circle cx="100" cy="80" r="50" fill="#2d3748" opacity="0.3" />
  <circle cx="320" cy="220" r="70" fill="#2d3748" opacity="0.2" />
  
  <!-- Wind Turbine (Background Eco-theme) -->
  <g stroke="#4a5568" stroke-width="2" fill="none">
    <line x1="80" y1="180" x2="80" y2="100" />
    <path d="M 80,100 L 60,85 M 80,100 L 105,95 M 80,100 L 75,125" stroke-linecap="round" stroke-width="2.5" />
    <circle cx="80" cy="100" r="3" fill="#4a5568" />
  </g>
  
  <!-- Electric Cargo Delivery Bike (Modern, Stylized) -->
  <g transform="translate(110, 100)">
    <!-- Wheels -->
    <circle cx="30" cy="110" r="25" fill="none" stroke="#2ecc71" stroke-width="5" />
    <circle cx="30" cy="110" r="5" fill="#2ecc71" />
    <circle cx="160" cy="110" r="25" fill="none" stroke="#2ecc71" stroke-width="5" />
    <circle cx="160" cy="110" r="5" fill="#2ecc71" />
    
    <!-- Bike Frame & Handlebars -->
    <path d="M 30,110 L 80,110 L 110,60 L 155,60" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="160" y1="110" x2="150" y2="55" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
    <line x1="150" y1="55" x2="140" y2="55" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
    
    <!-- Seat -->
    <line x1="110" y1="60" x2="100" y2="60" stroke="#ff7675" stroke-width="6" stroke-linecap="round" />
    
    <!-- Green Eco Cargo Box (Mounted in center-front) -->
    <rect x="65" y="65" width="70" height="45" rx="6" fill="#1abc9c" />
    <!-- Leaf logo on box -->
    <path d="M 95,80 C 105,75 110,85 105,92 C 95,95 90,88 95,80 Z" fill="#ffffff" />
    <line x1="95" y1="90" x2="101" y2="84" stroke="#1abc9c" stroke-width="1.5" />
  </g>
  
  <!-- Dynamic Speed Lines & Floating Leaves -->
  <line x1="60" y1="165" x2="120" y2="165" stroke="#2ecc71" stroke-width="3" stroke-linecap="round" opacity="0.6" />
  <line x1="40" y1="180" x2="90" y2="180" stroke="#2ecc71" stroke-width="2" stroke-linecap="round" opacity="0.4" />
  
  <!-- Floating stylized leaves -->
  <path d="M 290,120 C 295,115 302,120 298,127 C 290,130 286,124 290,120 Z" fill="#2ecc71" transform="rotate(15 292 122)" />
  <path d="M 70,80 C 75,75 82,80 78,87 C 70,90 66,84 70,80 Z" fill="#2ecc71" transform="rotate(-25 72 82)" />
  
</svg>
