<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <!-- Background Memphis Grid Pattern -->
    <pattern id="memphisGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#2d3748" opacity="0.4" />
    </pattern>
    
    <!-- Gradients for depth and rich styling -->
    <linearGradient id="awningGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7675" />
      <stop offset="100%" stop-color="#d63031" />
    </linearGradient>
    <linearGradient id="crateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e67e22" />
      <stop offset="100%" stop-color="#d35400" />
    </linearGradient>
    <linearGradient id="appleGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7675" />
      <stop offset="100%" stop-color="#c0392b" />
    </linearGradient>
    <linearGradient id="appleGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e74c3c" />
      <stop offset="100%" stop-color="#962d22" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2ecc71" />
      <stop offset="100%" stop-color="#27ae60" />
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#162431" />
      <stop offset="100%" stop-color="#0a1118" />
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f1c40f" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#f1c40f" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Deep Navy Base Background -->
  <rect width="100%" height="100%" fill="url(#skyGrad)"/>
  
  <!-- Subtle Background Grid Pattern -->
  <rect width="100%" height="100%" fill="url(#memphisGrid)" />
  
  <!-- Large Yellow Sun Glow in Background -->
  <circle cx="300" cy="100" r="120" fill="url(#sunGlow)" />
  
  <!-- Decorative Abstract Memphis Floating Elements -->
  <circle cx="60" cy="70" r="25" fill="#2d3748" opacity="0.3" />
  <path d="M 330,40 L 350,65 L 310,65 Z" fill="#ffd700" opacity="0.2" transform="rotate(15 330 50)" />
  <path d="M 40,240 Q 60,220 80,250" fill="none" stroke="#bdc3c7" stroke-width="2" stroke-linecap="round" opacity="0.2" />

  <!-- Market Stall Structure -->
  <!-- Back wall/pillar -->
  <rect x="330" y="70" width="8" height="180" fill="#34495e" rx="2" />
  <rect x="70" y="70" width="8" height="180" fill="#34495e" rx="2" />

  <!-- Market Stall Awning (Detailed 3D Stripes with Shadows) -->
  <!-- Shadow under awning -->
  <path d="M 50,75 L 350,75 L 340,90 L 60,90 Z" fill="#000000" opacity="0.3" />
  <!-- Awning Top -->
  <path d="M 60,40 L 340,40 L 350,75 L 50,75 Z" fill="url(#awningGrad)" />
  <!-- White stripes -->
  <path d="M 95,40 L 135,40 L 138,75 L 90,75 Z" fill="#ffffff" />
  <path d="M 180,40 L 220,40 L 222,75 L 175,75 Z" fill="#ffffff" />
  <path d="M 265,40 L 305,40 L 306,75 L 260,75 Z" fill="#ffffff" />
  <!-- Front scalloped edge of awning -->
  <path d="M 50,75 C 50,82 60,82 60,75 C 60,82 70,82 70,75 C 70,82 80,82 80,75 C 80,82 90,82 90,75 C 90,82 100,82 100,75 C 100,82 110,82 110,75 C 110,82 120,82 120,75 C 120,82 130,82 130,75 C 130,82 140,82 140,75 C 140,82 150,82 150,75 C 150,82 160,82 160,75 C 160,82 170,82 170,75 C 170,82 180,82 180,75 C 180,82 190,82 190,75 C 190,82 200,82 200,75 C 200,82 210,82 210,75 C 210,82 220,82 220,75 C 220,82 230,82 230,75 C 230,82 240,82 240,75 C 240,82 250,82 250,75 C 250,82 260,82 260,75 C 260,82 270,82 270,75 C 270,82 280,82 280,75 C 280,82 290,82 290,75 C 290,82 300,82 300,75 C 300,82 310,82 310,75 C 310,82 320,82 320,75 C 320,82 330,82 330,75 C 330,82 340,82 340,75 C 340,82 350,82 350,75 Z" fill="#d63031" />
  <path d="M 90,75 C 90,82 100,82 100,75 C 100,82 110,82 110,75 C 110,82 120,82 120,75 C 120,82 130,82 130,75 C 130,82 138,82 138,75 Z" fill="#eeeeee" />
  <path d="M 175,75 C 175,82 185,82 185,75 C 185,82 195,82 195,75 C 195,82 205,82 205,75 C 205,82 215,82 215,75 C 215,82 222,82 222,75 Z" fill="#eeeeee" />
  <path d="M 260,75 C 260,82 270,82 270,75 C 270,82 280,82 280,75 C 280,82 290,82 290,75 C 290,82 300,82 300,75 C 300,82 306,82 306,75 Z" fill="#eeeeee" />

  <!-- Wooden Crate (Detailed with wood grain and planks) -->
  <g transform="translate(110, 150)">
    <!-- Crate back interior -->
    <rect x="10" y="10" width="160" height="90" fill="#a04000" rx="3" />
    
    <!-- Apples Layer 1 (Back row, darker) -->
    <circle cx="35" cy="18" r="15" fill="#962d22" />
    <circle cx="65" cy="15" r="16" fill="#78241c" />
    <circle cx="95" cy="17" r="15" fill="#962d22" />
    <circle cx="125" cy="14" r="16" fill="#78241c" />
    <circle cx="150" cy="20" r="14" fill="#962d22" />
    
    <!-- Apples Layer 2 (Front row, bright with highlights) -->
    <circle cx="25" cy="35" r="16" fill="url(#appleGrad1)" />
    <circle cx="55" cy="32" r="17" fill="url(#appleGrad2)" />
    <circle cx="85" cy="34" r="16" fill="url(#appleGrad1)" />
    <circle cx="115" cy="31" r="17" fill="url(#appleGrad2)" />
    <circle cx="145" cy="36" r="15" fill="url(#appleGrad1)" />
    
    <!-- Sparkly yellow highlights on apples -->
    <circle cx="20" cy="28" r="3" fill="#ffffff" opacity="0.6" />
    <circle cx="50" cy="24" r="4" fill="#ffffff" opacity="0.6" />
    <circle cx="80" cy="27" r="3" fill="#ffffff" opacity="0.6" />
    <circle cx="110" cy="23" r="4" fill="#ffffff" opacity="0.6" />
    <circle cx="140" cy="30" r="3" fill="#ffffff" opacity="0.6" />
    
    <!-- Green Leaves tucked between apples -->
    <path d="M 40,20 Q 42,8 50,12" stroke="url(#leafGrad)" stroke-width="3" fill="none" stroke-linecap="round" />
    <path d="M 100,22 Q 102,10 110,14" stroke="url(#leafGrad)" stroke-width="3" fill="none" stroke-linecap="round" />
    
    <!-- Crate Wooden Planks (Front) -->
    <!-- Shadow behind planks -->
    <rect x="0" y="38" width="180" height="62" fill="#5e2700" rx="3" />
    <!-- Planks -->
    <rect x="0" y="40" width="180" height="16" rx="2" fill="url(#crateGrad)" />
    <rect x="0" y="61" width="180" height="16" rx="2" fill="url(#crateGrad)" />
    <rect x="0" y="82" width="180" height="16" rx="2" fill="url(#crateGrad)" />
    <!-- Nails in planks -->
    <circle cx="6" cy="48" r="1.5" fill="#7f8c8d" />
    <circle cx="174" cy="48" r="1.5" fill="#7f8c8d" />
    <circle cx="6" cy="69" r="1.5" fill="#7f8c8d" />
    <circle cx="174" cy="69" r="1.5" fill="#7f8c8d" />
    <circle cx="6" cy="90" r="1.5" fill="#7f8c8d" />
    <circle cx="174" cy="90" r="1.5" fill="#7f8c8d" />
  </g>

  <!-- Hanging Chalkboard Price Tag -->
  <g transform="translate(230, 90)">
    <!-- Hanging strings -->
    <line x1="20" y1="-10" x2="20" y2="5" stroke="#95a5a6" stroke-width="1.5" />
    <line x1="60" y1="-10" x2="60" y2="5" stroke="#95a5a6" stroke-width="1.5" />
    <!-- Board -->
    <rect x="5" y="5" width="70" height="42" rx="4" fill="#2c3e50" stroke="#f1c40f" stroke-width="2.5" />
    <!-- Chalk writing -->
    <path d="M 20,20 Q 28,15 35,22 T 50,18" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.9" />
    <text x="22" y="38" font-family="'Outfit', sans-serif" font-weight="bold" font-size="12" fill="#ffffff" opacity="0.9">$1.99</text>
  </g>

  <!-- Stylized Shopper's Arm & Hand Reaching (Premium Alegria/Corporate Memphis proportions) -->
  <g transform="translate(-10, 110)">
    <!-- Sleeve (Vibrant Teal with smooth curve) -->
    <path d="M -10,130 C 20,110 60,110 100,125 C 105,128 100,142 95,142 C 60,130 20,130 -10,150 Z" fill="#1abc9c" />
    <!-- Hand (Stylized peach tone, single thumb/palm block structure) -->
    <path d="M 98,127 C 103,124 112,125 116,130 C 120,135 118,142 110,143 C 104,144 98,142 95,142 Z" fill="#ff7675" />
    <!-- Fingers grabbing apple -->
    <circle cx="114" cy="130" r="3.5" fill="#e74c3c" />
  </g>
</svg>
