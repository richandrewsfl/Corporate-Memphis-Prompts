<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#1a1c24"/>
  <!-- Decorative background shapes -->
  <circle cx="330" cy="220" r="70" fill="#2d3748" opacity="0.3" />
  <circle cx="70" cy="80" r="40" fill="#a0aec0" opacity="0.1" />
  
  <!-- Food Stall Awning (Striped, Warm Red/Yellow) -->
  <path d="M 40,50 L 360,50 L 340,85 L 60,85 Z" fill="#e67e22" />
  <path d="M 80,50 L 120,50 L 110,85 L 70,85 Z" fill="#ffd700" />
  <path d="M 160,50 L 200,50 L 190,85 L 150,85 Z" fill="#ffd700" />
  <path d="M 240,50 L 280,50 L 270,85 L 230,85 Z" fill="#ffd700" />
  <path d="M 320,50 L 360,50 L 350,85 L 310,85 Z" fill="#ffd700" />
  
  <!-- Hanging Light Bulbs (Glow effect) -->
  <g stroke="#ffd700" stroke-width="2">
    <!-- Bulb 1 -->
    <line x1="100" y1="85" x2="100" y2="110" stroke="#7f8c8d" />
    <circle cx="100" cy="115" r="7" fill="#ffd700" />
    <circle cx="100" cy="115" r="15" fill="#ffd700" opacity="0.25" />
    
    <!-- Bulb 2 -->
    <line x1="200" y1="85" x2="200" y2="105" stroke="#7f8c8d" />
    <circle cx="200" cy="110" r="7" fill="#ffd700" />
    <circle cx="200" cy="110" r="15" fill="#ffd700" opacity="0.25" />
    
    <!-- Bulb 3 -->
    <line x1="300" y1="85" x2="300" y2="110" stroke="#7f8c8d" />
    <circle cx="300" cy="115" r="7" fill="#ffd700" />
    <circle cx="300" cy="115" r="15" fill="#ffd700" opacity="0.25" />
  </g>
  
  <!-- Stall Counter Table -->
  <rect x="50" y="200" width="300" height="60" rx="3" fill="#34495e" />
  <rect x="40" y="190" width="320" height="12" rx="4" fill="#2c3e50" />
  
  <!-- Chef / Vendor Preparing Food (Alegria-style oversized shapes) -->
  <g transform="translate(140, 110)">
    <!-- Body in Apron -->
    <path d="M 20,90 Q 40,35 70,40 Q 90,45 80,90 Z" fill="#e74c3c" />
    <!-- Apron straps -->
    <path d="M 30,50 L 40,40 M 70,50 L 60,40" stroke="#ffffff" stroke-width="2.5" />
    <rect x="35" y="55" width="30" height="30" rx="2" fill="#ffffff" />
    
    <!-- Spatula in hand -->
    <path d="M 15,65 Q -10,75 -25,60 M -25,60 L -30,50" stroke="#7f8c8d" stroke-width="3" fill="none" stroke-linecap="round" />
    <rect x="-38" y="42" width="12" height="15" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5" />
  </g>
  
  <!-- Steaming Pot on Counter -->
  <rect x="70" y="160" width="50" height="30" rx="2" fill="#7f8c8d" />
  <path d="M 65,160 L 125,160" stroke="#95a5a6" stroke-width="4" stroke-linecap="round" />
  <!-- Steam lines (Playful wave path) -->
  <path d="M 80,150 Q 85,140 80,130 Q 75,120 80,110" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5" stroke-linecap="round" />
  <path d="M 95,152 Q 100,142 95,132 Q 90,122 95,112" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5" stroke-linecap="round" />
  <path d="M 110,150 Q 115,140 110,130 Q 105,120 110,110" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5" stroke-linecap="round" />
  
</svg>
