<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#1a1c24"/>
  
  <!-- Memphis grid pattern in background -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#2d3748" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" opacity="0.5" />
  
  <!-- Floating Bar Chart -->
  <g transform="translate(60, 80)">
    <!-- Grid lines -->
    <line x1="0" y1="120" x2="160" y2="120" stroke="#4a5568" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="120" stroke="#4a5568" stroke-width="2"/>
    
    <!-- Bars -->
    <rect x="20" y="60" width="20" height="60" fill="#2ecc71" rx="2" />
    <rect x="55" y="30" width="20" height="90" fill="#e67e22" rx="2" />
    <rect x="90" y="80" width="20" height="40" fill="#3498db" rx="2" />
    <rect x="125" y="10" width="20" height="110" fill="#9b59b6" rx="2" />
  </g>
  
  <!-- Floating Line Graph -->
  <g transform="translate(200, 50)">
    <path d="M 20,80 L 60,30 L 100,50 L 140,10 L 170,40" fill="none" stroke="#e74c3c" stroke-width="4" stroke-linecap="round" />
    <circle cx="20" cy="80" r="5" fill="#ffffff" stroke="#e74c3c" stroke-width="2" />
    <circle cx="60" cy="30" r="5" fill="#ffffff" stroke="#e74c3c" stroke-width="2" />
    <circle cx="100" cy="50" r="5" fill="#ffffff" stroke="#e74c3c" stroke-width="2" />
    <circle cx="140" cy="10" r="5" fill="#ffffff" stroke="#e74c3c" stroke-width="2" />
    <circle cx="170" cy="40" r="5" fill="#ffffff" stroke="#e74c3c" stroke-width="2" />
  </g>
  
  <!-- Giant Magnifying Glass -->
  <g transform="translate(180, 100) rotate(-25)">
    <!-- Handle -->
    <rect x="40" y="90" width="20" height="80" rx="5" fill="#d35400" stroke="#2c3e50" stroke-width="3" />
    <rect x="45" y="90" width="10" height="40" fill="#e67e22" />
    
    <!-- Connection -->
    <rect x="45" y="75" width="10" height="15" fill="#bdc3c7" />
    
    <!-- Glass Rim -->
    <circle cx="50" cy="40" r="45" fill="none" stroke="#2c3e50" stroke-width="8" />
    <!-- Glass Highlight -->
    <circle cx="50" cy="40" r="41" fill="#3498db" opacity="0.2" />
    <path d="M 20,25 A 35,35 0 0,1 70,10" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
