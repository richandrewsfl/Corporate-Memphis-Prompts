<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#1a1c24"/>
  <!-- Decorative background grid -->
  <path d="M 50,0 L 50,300 M 150,0 L 150,300 M 250,0 L 250,300 M 350,0 L 350,300" stroke="#2d3748" stroke-width="1" opacity="0.3" />
  <path d="M 0,50 L 400,50 M 0,150 L 400,150 M 0,250 L 400,250" stroke="#2d3748" stroke-width="1" opacity="0.3" />
  <circle cx="300" cy="180" r="90" fill="#9b59b6" opacity="0.1" />
  
  <!-- Stylized Shopper (Alegria style profile, pink/red skin, neon purple hair) -->
  <path d="M -30,320 Q 30,220 80,240 Q 120,250 110,310 Z" fill="#9b59b6" />
  <!-- Neck and Head -->
  <path d="M 45,245 Q 60,200 45,170 Q 20,130 50,110 Q 80,105 90,140 Q 95,175 75,240 Z" fill="#ff7675" />
  <!-- Hair (Abstract swooping shapes) -->
  <path d="M 50,110 Q 20,100 10,130 Q -5,160 10,180 Q 20,140 45,130 Z" fill="#e74c3c" />
  
  <!-- VR Headset -->
  <rect x="55" y="125" width="50" height="28" rx="8" fill="#1abc9c" stroke="#111" stroke-width="2" />
  <!-- VR Headset Glow -->
  <rect x="52" y="122" width="56" height="34" rx="11" fill="none" stroke="#1abc9c" stroke-width="2" opacity="0.5" />
  <!-- Strap -->
  <path d="M 55,138 L 25,138" stroke="#34495e" stroke-width="6" />
  
  <!-- Virtual Product Interface (Floating Neon Shapes) -->
  <!-- Product 1: Stylized shoe/sneaker -->
  <g transform="translate(190, 70) rotate(-10)">
    <rect x="-10" y="-10" width="80" height="70" rx="10" fill="#34495e" opacity="0.8" stroke="#9b59b6" stroke-width="2" />
    <path d="M 5,30 C 5,20 15,10 30,10 C 45,10 50,25 60,25 L 60,40 L 5,40 Z" fill="#ff7675" />
    <circle cx="20" cy="40" r="6" fill="#ffffff" />
    <circle cx="45" cy="40" r="6" fill="#ffffff" />
  </g>
  
  <!-- Product 2: Stylized handbag -->
  <g transform="translate(250, 150) rotate(5)">
    <rect x="-10" y="-10" width="80" height="70" rx="10" fill="#34495e" opacity="0.8" stroke="#1abc9c" stroke-width="2" />
    <path d="M 10,25 L 50,25 L 55,48 L 5,48 Z" fill="#f1c40f" />
    <path d="M 20,25 C 20,15 40,15 40,25" stroke="#f39c12" stroke-width="3" fill="none" />
  </g>
  
  <!-- Holographic lines & Sparkles linking headset to products -->
  <path d="M 105,138 L 180,100" stroke="#1abc9c" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.8" />
  <path d="M 105,138 L 240,170" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.8" />
  
  <circle cx="160" cy="180" r="4" fill="#ffd700" />
  <path d="M 320,50 L 324,45 L 320,40 L 316,45 Z" fill="#2ecc71" />
  
</svg>
