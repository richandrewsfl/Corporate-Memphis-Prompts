<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#1a1c24"/>
  <!-- Decorative Memphis Background Shapes -->
  <circle cx="80" cy="80" r="50" fill="#2d3748" opacity="0.3" />
  <circle cx="320" cy="220" r="70" fill="#a0aec0" opacity="0.1" />
  <path d="M 300,50 L 320,80 L 280,80 Z" fill="#ff7675" opacity="0.8" />
  <path d="M 50,220 L 70,250 L 30,250 Z" fill="#1abc9c" opacity="0.8" />
  
  <!-- Credit Card (Behind phone) -->
  <rect x="200" y="80" width="140" height="90" rx="10" fill="url(#cardGrad)" transform="rotate(-15 270 125)" />
  <rect x="220" y="100" width="30" height="20" rx="3" fill="#ffd700" transform="rotate(-15 270 125)" />
  
  <!-- Smartphone (Centered/Left) -->
  <rect x="90" y="40" width="110" height="210" rx="16" fill="#2d3748" stroke="#4a5568" stroke-width="4" />
  <rect x="98" y="55" width="94" height="180" rx="8" fill="#ffffff" />
  
  <!-- Phone Screen Content (Cart and Items) -->
  <!-- Cart Header -->
  <rect x="110" y="65" width="70" height="15" rx="3" fill="#1abc9c" />
  <!-- Shopping Cart Icon -->
  <path d="M125,120 L135,120 L140,135 L160,135 L165,125 M135,120 L138,130 L162,130" stroke="#8e44ad" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="142" cy="142" r="3" fill="#8e44ad" />
  <circle cx="158" cy="142" r="3" fill="#8e44ad" />
  
  <!-- Checkout Button -->
  <rect x="110" y="210" width="70" height="15" rx="4" fill="#8e44ad" />
  <rect x="125" y="215" width="40" height="5" rx="2" fill="#ffffff" />
  
  <!-- Shopping Bag (Front) -->
  <path d="M 230,160 L 290,160 L 300,240 L 220,240 Z" fill="#ff7675" />
  <!-- Bag Handle -->
  <path d="M 245,160 C 245,130 275,130 275,160" stroke="#d63031" stroke-width="4" fill="none" />
  
  <!-- Floating Sparkles / Elements -->
  <path d="M 120,95 L 125,90 L 120,85 L 115,90 Z" fill="#ffd700" />
  <path d="M 290,110 L 295,105 L 290,100 L 285,105 Z" fill="#1abc9c" />
  
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b59b6" />
      <stop offset="100%" stop-color="#8e44ad" />
    </linearGradient>
  </defs>
</svg>
