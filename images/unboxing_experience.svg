<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#1a1c24"/>
  <!-- Decorative background shapes -->
  <circle cx="80" cy="220" r="60" fill="#2d3748" opacity="0.3" />
  <circle cx="340" cy="80" r="50" fill="#a0aec0" opacity="0.1" />
  
  <!-- Opened Cardboard Box (Center-Bottom) -->
  <g transform="translate(130, 150)">
    <!-- Box Bottom/Front -->
    <polygon points="20,80 120,80 120,30 20,30" fill="#d35400" />
    <polygon points="20,30 120,30 100,0 0,0" fill="#e67e22" />
    <polygon points="0,0 20,30 20,80 0,50" fill="#ba5c12" />
    
    <!-- Opened Box Flaps -->
    <!-- Left Flap -->
    <polygon points="0,0 -40,-10 -20,20 20,30" fill="#e67e22" opacity="0.9" />
    <!-- Right Flap -->
    <polygon points="120,30 160,20 140,-10 100,0" fill="#e67e22" opacity="0.9" />
    <!-- Front Flap (hanging down) -->
    <polygon points="20,30 120,30 110,50 30,50" fill="#e67e22" opacity="0.95" />
    
    <!-- Inside Shadow/Opening -->
    <polygon points="15,20 105,20 95,2 5,2" fill="#2c3e50" />
  </g>
  
  <!-- Floating magical stars and sparkles rising from the box -->
  <!-- Gold Stars -->
  <g transform="translate(180, 80) scale(1.2)">
    <path d="M 10,0 L 13,7 L 20,10 L 13,13 L 10,20 L 7,13 L 0,10 L 7,7 Z" fill="#ffd700" />
  </g>
  <g transform="translate(130, 95) scale(0.8)">
    <path d="M 10,0 L 13,7 L 20,10 L 13,13 L 10,20 L 7,13 L 0,10 L 7,7 Z" fill="#ffd700" />
  </g>
  <g transform="translate(245, 105) scale(0.9)">
    <path d="M 10,0 L 13,7 L 20,10 L 13,13 L 10,20 L 7,13 L 0,10 L 7,7 Z" fill="#ff7675" />
  </g>
  
  <!-- Sparkles/Confetti -->
  <circle cx="160" cy="60" r="3" fill="#1abc9c" />
  <circle cx="230" cy="70" r="4" fill="#9b59b6" />
  <path d="M 110,130 Q 115,120 125,125" fill="none" stroke="#2ecc71" stroke-width="3" stroke-linecap="round" />
  <path d="M 270,140 Q 280,145 285,135" fill="none" stroke="#e67e22" stroke-width="3" stroke-linecap="round" />
  
  <!-- Product emerging: A sleek, glowing camera/gadget -->
  <g transform="translate(170, 110)">
    <rect x="0" y="0" width="50" height="35" rx="5" fill="#1abc9c" stroke="#111" stroke-width="2" />
    <circle cx="25" cy="17" r="10" fill="#34495e" stroke="#ffffff" stroke-width="2" />
    <circle cx="40" cy="8" r="3" fill="#ff7675" />
  </g>
  
</svg>
