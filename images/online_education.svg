<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#0f3d53"/>
  
  <!-- Memphis Background Details -->
  <line x1="30" y1="50" x2="100" y2="50" stroke="#f1c40f" stroke-width="4" stroke-dasharray="8,8" />
  <circle cx="340" cy="80" r="15" fill="#2ecc71" opacity="0.7"/>
  <circle cx="80" cy="220" r="30" fill="#e74c3c" opacity="0.3"/>
  
  <!-- Book Stack -->
  <!-- Bottom Book (Purple) -->
  <rect x="80" y="210" width="240" height="30" rx="4" fill="#9b59b6" />
  <rect x="80" y="215" width="220" height="20" fill="#8e44ad" />
  <rect x="300" y="213" width="20" height="24" fill="#f1f2f6" />
  
  <!-- Middle Book (Green) -->
  <rect x="110" y="175" width="200" height="30" rx="4" fill="#2ecc71" />
  <rect x="110" y="180" width="180" height="20" fill="#27ae60" />
  <rect x="290" y="178" width="20" height="24" fill="#f1f2f6" />
  
  <!-- Top Book (Yellow/Orange) -->
  <rect x="95" y="140" width="220" height="30" rx="4" fill="#f1c40f" />
  <rect x="95" y="145" width="200" height="20" fill="#d35400" />
  <rect x="295" y="143" width="20" height="24" fill="#f1f2f6" />
  
  <!-- Graduation Cap (Floating) -->
  <g transform="translate(140, 40)">
    <!-- Cap base -->
    <rect x="35" y="30" width="50" height="15" fill="#34495e" />
    <!-- Diamond top -->
    <polygon points="60,10 110,25 60,40 10,25" fill="#2c3e50" />
    <!-- Tassel -->
    <path d="M 60,25 L 90,30 L 95,45" stroke="#f1c40f" stroke-width="2" fill="none"/>
    <circle cx="95" cy="47" r="4" fill="#f1c40f" />
  </g>
  
  <!-- Stylized tablet leaning on books -->
  <rect x="210" y="90" width="100" height="70" rx="6" fill="#bdc3c7" transform="rotate(-10 260 125)" />
  <rect x="215" y="95" width="90" height="60" rx="2" fill="#ffffff" transform="rotate(-10 260 125)" />
  <!-- Screen items -->
  <circle cx="235" cy="115" r="10" fill="#3498db" transform="rotate(-10 260 125)"/>
  <rect x="250" y="110" width="40" height="4" rx="1" fill="#7f8c8d" transform="rotate(-10 260 125)"/>
  <rect x="250" y="120" width="30" height="4" rx="1" fill="#7f8c8d" transform="rotate(-10 260 125)"/>
</svg>
